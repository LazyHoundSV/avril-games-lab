name: Cloudflare Pages Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-production-main
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: error

  deploy-production:
    name: Deploy production
    needs: build
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PROJECT_NAME: ${{ vars.CLOUDFLARE_PROJECT_NAME || 'avril-games-lab' }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Validate Cloudflare config
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID secret" && exit 1)
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN secret" && exit 1)
          test -n "$CLOUDFLARE_PROJECT_NAME" || (echo "Missing CLOUDFLARE_PROJECT_NAME variable" && exit 1)

      - name: Deploy to Cloudflare Pages
        id: deploy
        run: |
          npx wrangler@4 pages deploy dist \
            --project-name "$CLOUDFLARE_PROJECT_NAME" \
            --branch main \
            | tee wrangler-output.txt

          DEPLOY_URL="$(grep -Eo 'https://[^[:space:]]+\.pages\.dev' wrangler-output.txt | tail -n 1)"
          if [ -z "$DEPLOY_URL" ]; then
            echo "Could not find Cloudflare Pages production URL in Wrangler output"
            exit 1
          fi

          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          {
            echo "## Cloudflare Pages Production"
            echo
            echo "$DEPLOY_URL"
            echo
            echo "Canonical URL: https://avril-games-lab.pages.dev"
          } >> "$GITHUB_STEP_SUMMARY"
