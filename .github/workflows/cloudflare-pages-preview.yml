name: Cloudflare Pages Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: cloudflare-pages-preview-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    outputs:
      has-app: ${{ steps.detect.outputs.has-app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect app
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "has-app=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-app=false" >> "$GITHUB_OUTPUT"
            echo "No package.json found; skipping Cloudflare Pages preview until the app exists on this branch."
          fi

      - name: Setup Node
        if: steps.detect.outputs.has-app == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        if: steps.detect.outputs.has-app == 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Typecheck
        if: steps.detect.outputs.has-app == 'true'
        run: npm run typecheck

      - name: Test
        if: steps.detect.outputs.has-app == 'true'
        run: npm run test

      - name: Build
        if: steps.detect.outputs.has-app == 'true'
        run: npm run build

      - name: Upload build artifact
        if: steps.detect.outputs.has-app == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: error

  deploy-preview:
    name: Deploy PR preview
    needs: build
    runs-on: ubuntu-latest
    if: >-
      needs.build.outputs.has-app == 'true' &&
      (github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PROJECT_NAME: ${{ vars.CLOUDFLARE_PROJECT_NAME || 'avril-games-lab' }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Validate Cloudflare config
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID secret" && exit 1)
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN secret" && exit 1)
          test -n "$CLOUDFLARE_PROJECT_NAME" || (echo "Missing CLOUDFLARE_PROJECT_NAME variable" && exit 1)

      - name: Deploy to Cloudflare Pages
        id: deploy
        run: |
          BRANCH_NAME="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          npx wrangler@4 pages deploy dist \
            --project-name "$CLOUDFLARE_PROJECT_NAME" \
            --branch "$BRANCH_NAME" \
            | tee wrangler-output.txt

          DEPLOY_URL="$(grep -Eo 'https://[^ ]+\\.pages\\.dev' wrangler-output.txt | tail -n 1)"
          if [ -z "$DEPLOY_URL" ]; then
            echo "Could not find Cloudflare Pages preview URL in Wrangler output"
            exit 1
          fi

          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          {
            echo "## Cloudflare Pages Preview"
            echo
            echo "$DEPLOY_URL"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cloudflare-pages-preview -->';
            const body = `${marker}\nCloudflare Pages preview: ${{ steps.deploy.outputs.url }}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const previous = comments.data.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
